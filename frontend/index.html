<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ask questions about your documents using local LLM-powered retrieval augmented generation.">
    <title>DocQA — Document Q&A</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>DocQA</h1>
            </div>

            <div class="upload-section">
                <div class="drop-zone" id="drop-zone">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <span>Drop files here or click to upload</span>
                    <span class="drop-zone-hint">PDF, DOCX, TXT</span>
                    <input type="file" id="file-input" accept=".pdf,.docx,.txt" hidden>
                </div>
                <div class="upload-progress" id="upload-progress" hidden>
                    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                    <span class="progress-text" id="progress-text">Uploading...</span>
                </div>
            </div>

            <div class="documents-section">
                <h2>Documents</h2>
                <div class="document-list" id="document-list">
                    <p class="empty-state">No documents uploaded</p>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="chat-container">
                <div class="messages" id="messages">
                    <div class="welcome-message">
                        <h2>Ask your documents</h2>
                        <p>Upload a document and ask questions about its content. Answers are grounded in your uploaded files.</p>
                    </div>
                </div>

                <div class="input-area">
                    <form id="ask-form">
                        <div class="input-wrapper">
                            <textarea
                                id="question-input"
                                placeholder="Ask a question..."
                                rows="1"
                                autofocus
                            ></textarea>
                            <button type="submit" id="send-btn" title="Send">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="22" y1="2" x2="11" y2="13"/>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                                </svg>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <aside class="sources-panel" id="sources-panel" hidden>
                <div class="sources-header">
                    <h3>Sources</h3>
                    <button class="close-btn" id="close-sources" title="Close">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
                <div class="sources-list" id="sources-list"></div>
            </aside>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
