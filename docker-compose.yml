services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/data/chroma
      - ./frontend:/app/frontend
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  chroma_data:
